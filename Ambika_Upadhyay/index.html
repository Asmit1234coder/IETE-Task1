<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <header>
        <h1>Recipe Finder</h1>
    </header>

    <div class="recipeFinderContainer">
        <form class="searchBar">
            <input type="text" id="recipeName" placeholder="What are you craving today?">
            <button class="searchBtn" type="submit">
                <img src="searchImage_20.png" alt="Search" id="searchImg">
            </button>
        </form>

        <div class="messageArea" id="messageArea">
            <p></p>
        </div>

        <div class="randomRecipe">
            <h2>Can't decide what to make?</h2>
            <button id="randomRecipeBtn" type="find">Surprise yourself!</button>
        </div>

        <div id="resultGrid">


        </div>

        <div class = 'modalContainer hidden' id="recipeModal">
            <div class="modalContent">
                <button id="modalCloseBtn" class="modalCloseBtn">+</button>
                <div id="recipeDetailsContent">
                   
                    <!-- DETAILS WILL BE HERE-->

                </div>
            </div>
        </div>
    </div>

    <script src="index.js" defer></script>
</body>
</html>
